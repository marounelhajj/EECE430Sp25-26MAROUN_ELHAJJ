<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}VolleyPlayer Manager{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --sand: #f5f0e8;
            --court: #e8d5b0;
            --navy: #0d1b2a;
            --blue: #1a4a7a;
            --sky: #3b82c4;
            --gold: #e8a020;
            --red: #c0392b;
            --text: #1a1a2e;
            --muted: #6b7280;
            --white: #ffffff;
            --radius: 12px;
            --shadow: 0 4px 24px rgba(13,27,42,0.12);
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--sand);
            color: var(--text);
            min-height: 100vh;
        }

        /* ── NAV ── */
        nav {
            background: var(--navy);
            padding: 0 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 64px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 12px rgba(0,0,0,0.3);
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .nav-brand .ball {
            width: 34px;
            height: 34px;
            background: radial-gradient(circle at 35% 35%, #fff 0%, var(--gold) 60%, #c07010 100%);
            border-radius: 50%;
            border: 3px solid var(--gold);
            box-shadow: 0 2px 8px rgba(232,160,32,0.4);
        }

        .nav-brand span {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.6rem;
            color: var(--white);
            letter-spacing: 2px;
        }

        .nav-brand span em {
            color: var(--gold);
            font-style: normal;
        }

        .nav-links { display: flex; gap: 1rem; }

        .nav-links a {
            color: rgba(255,255,255,0.75);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            padding: 6px 14px;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .nav-links a:hover, .nav-links a.active {
            background: var(--gold);
            color: var(--navy);
        }

        /* ── CONTAINER ── */
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        /* ── PAGE HEADER ── */
        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2rem;
        }

        .page-header h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.6rem;
            color: var(--navy);
            letter-spacing: 2px;
            line-height: 1;
        }

        .page-header h1 span { color: var(--sky); }

        /* ── ALERTS ── */
        .messages { margin-bottom: 1.5rem; }

        .alert {
            padding: 12px 18px;
            border-radius: var(--radius);
            font-weight: 500;
            font-size: 0.9rem;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .alert-success { background: #d1fae5; color: #065f46; border-left: 4px solid #10b981; }
        .alert-error   { background: #fee2e2; color: #991b1b; border-left: 4px solid #ef4444; }

        /* ── BUTTONS ── */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 10px 20px;
            border-radius: 8px;
            font-family: 'DM Sans', sans-serif;
            font-weight: 600;
            font-size: 0.875rem;
            cursor: pointer;
            text-decoration: none;
            border: none;
            transition: all 0.18s;
        }

        .btn-primary   { background: var(--navy); color: var(--white); }
        .btn-primary:hover { background: var(--blue); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(13,27,42,0.25); }
        .btn-gold      { background: var(--gold); color: var(--navy); }
        .btn-gold:hover { background: #d4901a; transform: translateY(-1px); }
        .btn-danger    { background: var(--red); color: var(--white); }
        .btn-danger:hover { background: #a93226; transform: translateY(-1px); }
        .btn-outline   { background: transparent; color: var(--navy); border: 2px solid var(--navy); }
        .btn-outline:hover { background: var(--navy); color: var(--white); }
        .btn-sm        { padding: 6px 14px; font-size: 0.8rem; }

        /* ── SEARCH BAR ── */
        .search-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 1.5rem;
        }

        .search-bar input {
            flex: 1;
            padding: 10px 16px;
            border: 2px solid var(--court);
            border-radius: 8px;
            font-size: 0.9rem;
            font-family: 'DM Sans', sans-serif;
            background: var(--white);
            transition: border-color 0.2s;
        }

        .search-bar input:focus { outline: none; border-color: var(--sky); }

        /* ── TABLE ── */
        .table-card {
            background: var(--white);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        table { width: 100%; border-collapse: collapse; }

        thead { background: var(--navy); }

        thead th {
            padding: 14px 16px;
            text-align: left;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 0.95rem;
            letter-spacing: 1.5px;
            color: var(--gold);
            font-weight: 400;
        }

        tbody tr {
            border-bottom: 1px solid #f0ebe0;
            transition: background 0.15s;
        }

        tbody tr:hover { background: #faf7f0; }
        tbody tr:last-child { border-bottom: none; }

        tbody td {
            padding: 14px 16px;
            font-size: 0.875rem;
            color: var(--text);
        }

        .player-id {
            font-weight: 700;
            color: var(--muted);
            font-size: 0.8rem;
        }

        .player-name { font-weight: 600; }

        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge-setter          { background: #dbeafe; color: #1e40af; }
        .badge-outside_hitter  { background: #dcfce7; color: #166534; }
        .badge-opposite        { background: #fef3c7; color: #92400e; }
        .badge-middle_blocker  { background: #fce7f3; color: #9d174d; }
        .badge-libero          { background: #ede9fe; color: #4c1d95; }
        .badge-defensive_specialist { background: #e0f2fe; color: #075985; }

        .salary { font-weight: 600; color: #166534; }

        .action-btns { display: flex; gap: 6px; }

        /* ── EMPTY STATE ── */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--muted);
        }

        .empty-state .big-icon { font-size: 4rem; margin-bottom: 1rem; }
        .empty-state h3 { font-size: 1.2rem; margin-bottom: 0.5rem; color: var(--text); }

        /* ── FORM CARD ── */
        .form-card {
            background: var(--white);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 2.5rem;
            max-width: 680px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.25rem;
        }

        .form-group { display: flex; flex-direction: column; gap: 6px; }
        .form-group.full-width { grid-column: 1 / -1; }

        label {
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--muted);
        }

        .form-control {
            padding: 10px 14px;
            border: 2px solid #e5e0d5;
            border-radius: 8px;
            font-size: 0.9rem;
            font-family: 'DM Sans', sans-serif;
            transition: border-color 0.2s;
            background: var(--sand);
        }

        .form-control:focus { outline: none; border-color: var(--sky); background: var(--white); }

        .form-actions {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid #eee;
        }

        /* ── DETAIL CARD ── */
        .detail-card {
            background: var(--white);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            max-width: 700px;
        }

        .detail-header {
            background: var(--navy);
            padding: 2rem 2.5rem;
            color: var(--white);
        }

        .detail-header h2 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.2rem;
            letter-spacing: 2px;
        }

        .detail-header .player-id-badge {
            display: inline-block;
            background: rgba(255,255,255,0.15);
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .detail-body { padding: 2rem 2.5rem; }

        .detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .detail-item label {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--muted);
            margin-bottom: 4px;
        }

        .detail-item .value {
            font-size: 1rem;
            font-weight: 500;
            color: var(--text);
        }

        .detail-actions {
            padding: 1.5rem 2.5rem;
            background: #faf7f0;
            border-top: 1px solid #eee;
            display: flex;
            gap: 1rem;
        }

        /* ── DELETE CONFIRM ── */
        .confirm-card {
            background: var(--white);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 2.5rem;
            max-width: 480px;
            text-align: center;
        }

        .confirm-card .warning-icon { font-size: 3.5rem; margin-bottom: 1rem; }
        .confirm-card h2 { font-size: 1.4rem; margin-bottom: 0.5rem; color: var(--text); }
        .confirm-card p { color: var(--muted); margin-bottom: 2rem; line-height: 1.6; }

        .stats-bar {
            background: var(--navy);
            color: var(--white);
            padding: 10px 0;
            margin-bottom: 0;
        }

        .stats-bar-inner {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 1.5rem;
            display: flex;
            gap: 2rem;
            font-size: 0.82rem;
        }

        .stats-bar-inner span { color: rgba(255,255,255,0.6); }
        .stats-bar-inner strong { color: var(--gold); }
    </style>
</head>
<body>

<nav>
    <a href="/" class="nav-brand">
        <div class="ball"></div>
        <span>Volley<em>Player</em> List</span>
    </a>
    <div class="nav-links">
        <a href="/" class="{% block nav_home %}{% endblock %}">Players</a>
        <a href="/player/add/" class="{% block nav_add %}{% endblock %}">+ Add Player</a>
    </div>
</nav>

{% block stats_bar %}{% endblock %}

<div class="container">
    {% if messages %}
    <div class="messages">
        {% for message in messages %}
        <div class="alert alert-{{ message.tags }}">
            {% if message.tags == 'success' %}✅{% else %}⚠️{% endif %}
            {{ message }}
        </div>
        {% endfor %}
    </div>
    {% endif %}

    {% block content %}{% endblock %}
</div>

</body>
</html>
